name: Docker Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: vantagac/chamchamcham-api
  DEPLOY_TARGET: wingwogus@hyunserver.iptime.org
  DEPLOY_PATH: /home/wingwogus/apps/chamchamcham

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            backend/*.gradle.kts
            backend/**/build.gradle.kts
            backend/gradle/wrapper/gradle-wrapper.properties

      - name: Run backend tests
        working-directory: ./backend
        run: ./gradlew test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail

          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY secret is required}"

          deploy_host="${DEPLOY_TARGET#*@}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/chamchamcham_deploy_key
          chmod 600 ~/.ssh/chamchamcham_deploy_key
          ssh-keyscan -H "$deploy_host" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/chamchamcham_deploy_key "$DEPLOY_TARGET" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/chamchamcham_deploy_key docker-compose.yml "$DEPLOY_TARGET:$DEPLOY_PATH/docker-compose.yml"

          ssh -i ~/.ssh/chamchamcham_deploy_key "$DEPLOY_TARGET" \
            "cd '$DEPLOY_PATH' && test -f .env || { echo '.env is missing in $DEPLOY_PATH'; exit 1; }"
          ssh -i ~/.ssh/chamchamcham_deploy_key "$DEPLOY_TARGET" \
            "cd '$DEPLOY_PATH' && docker compose pull api && docker compose up -d api"
